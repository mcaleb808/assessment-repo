name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: assessment-mcaleb808
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/assessment-mcaleb808/assessment-repo
  WIF_PROVIDER: projects/900429094980/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: gh-deployer@assessment-mcaleb808.iam.gserviceaccount.com

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install api dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Lint api
        working-directory: apps/api
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Test api
        working-directory: apps/api
        run: uv run pytest -q

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint web
        working-directory: apps/web
        run: pnpm lint

      - name: Typecheck web
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build web
        working-directory: apps/web
        run: pnpm build

  build-push:
    name: Build and push ${{ matrix.service }}
    needs: lint-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web]
    outputs:
      api_image: ${{ steps.tag.outputs.api_image }}
      web_image: ${{ steps.tag.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          echo "image=${REGISTRY}/${{ matrix.service }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-api:
    name: Deploy api
    needs: build-push
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Deploy api to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: assessment-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: --quiet

      - name: Print api URL
        run: echo "api=${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy-web:
    name: Deploy web
    needs: [build-push, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Deploy web to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: assessment-web
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/web:${{ github.sha }}
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ needs.deploy-api.outputs.url }}
          flags: --quiet

      - name: Print web URL
        run: echo "web=${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
